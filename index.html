<!DOCTYPE html>
<html>

<head>
  <title>Flashcards</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body class="bg-dark">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="index.html">New Word</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="quiz.html">Quiz</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container text-light">
  <h1 class="my-4">Create New Word</h1>
  <form id="newWordForm" data-bs-theme="dark">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="german" class="form-label">German Word</label>
        <input type="text" class="form-control" id="german" name="german" required>
      </div>
      <div class="col-md-6 mb-3">
        <label for="article" class="form-label">Article</label>
        <select class="form-select" id="article" name="article">
          <option value="">Select Article</option>
          <option value="der">der</option>
          <option value="die">die</option>
          <option value="das">das</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="english" class="form-label">English Translation</label>
        <input type="text" class="form-control" id="english" name="english" required>
      </div>
      <div class="col-md-6 mb-3">
        <label for="plural" class="form-label">Plural</label>
        <input type="text" class="form-control" id="plural" name="plural">
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="feminine" class="form-label">Feminine Form</label>
        <input type="text" class="form-control" id="feminine" name="feminine">
      </div>
      <div class="col-md-6 mb-3">
        <label for="pastPerfect" class="form-label">Past Perfect</label>
        <input type="text" class="form-control" id="pastPerfect" name="pastPerfect">
      </div>
    </div>
    <h3 class="my-3">Conjugation</h3>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label for="conj1" class="form-label">1st Person</label>
        <input type="text" class="form-control" id="conj1" name="conj1">
      </div>
      <div class="col-md-4 mb-3">
        <label for="conj2" class="form-label">2nd Person</label>
        <input type="text" class="form-control" id="conj2" name="conj2">
      </div>
      <div class="col-md-4 mb-3">
        <label for="conj3" class="form-label">3rd Person</label>
        <input type="text" class="form-control" id="conj3" name="conj3">
      </div>
    </div>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label for="conj4" class="form-label">4th Person</label>
        <input type="text" class="form-control" id="conj4" name="conj4">
      </div>
      <div class="col-md-4 mb-3">
        <label for="conj5" class="form-label">5th Person</label>
        <input type="text" class="form-control" id="conj5" name="conj5">
      </div>
      <div class="col-md-4 mb-3">
        <label for="conj6" class="form-label">6th Person</label>
        <input type="text" class="form-control" id="conj6" name="conj6">
      </div>
    </div>
    <h3 class="my-3">Examples</h3>
    <div id="examplesContainer">
      <div class="example-row row mb-3">
        <div class="col-md-5 mb-3">
          <label class="form-label">English Example</label>
          <input type="text" class="form-control" name="exEng[]">
        </div>
        <div class="col-md-5 mb-3">
          <label class="form-label">German Example</label>
          <input type="text" class="form-control" name="exGer[]">
        </div>
        <div class="col-md-2 mb-3 d-flex align-items-end">
          <button type="button" class="btn btn-danger remove-example">Remove</button>
        </div>
      </div>
    </div>
    <button type="button" id="addExample" class="btn btn-secondary mb-3">Add Another Example</button>
    <button type="submit" class="btn btn-primary">Create Word</button>
  </form>
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>

</html>
