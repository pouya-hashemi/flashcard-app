<!DOCTYPE html>
<html>

<head>
  <title>Flashcards</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body class="bg-dark">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
         <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="index.html">Words</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="quiz.html">Quiz</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container text-light">
  <h1 class="my-4">Quiz</h1>
  <div class="row mb-4">
    <div class="col-md-4">
      <label for="bookFilter" class="form-label">Book</label>
      <select multiple class="form-select" id="bookFilter">
        <!-- Options will be populated by JS -->
      </select>
    </div>
    <div class="col-md-4">
      <label for="difficultyFilter" class="form-label">Difficulty</label>
      <select multiple class="form-select" id="difficultyFilter">
        <option value="0">0 (Unset)</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </div>
    <div class="col-md-4 d-flex align-items-end">
      <button class="btn btn-primary me-2" id="englishBtn">English</button>
      <button class="btn btn-secondary" id="germanBtn">German</button>
    </div>
  </div>
  <div class="row">
    <div class="col-md-8 offset-md-2">
      <div class="card bg-secondary text-light mb-4" id="wordCard" style="display: none;">
        <div class="card-body">
          <h2 class="card-title text-center" id="wordDisplay"></h2>
          <div class="text-center mb-3">
            <button class="btn btn-warning me-2" id="revealBtn">Reveal</button>
            <button class="btn btn-info" id="conjugationBtn" style="display: none;">Conjugations</button>
          </div>
          <div id="conjugationDisplay" style="display: none;" class="mb-3">
            <!-- Conjugations will be shown here -->
          </div>
          <div id="examplesDisplay">
            <!-- Examples will be shown here -->
          </div>
          <div id="detailsDisplay" style="display: none;" class="mt-3">
            <!-- Translation, article, etc. will be shown here -->
          </div>
        </div>
      </div>
      <div class="text-center">
        <button class="btn btn-outline-light me-2" id="prevBtn">Previous</button>
        <button class="btn btn-outline-light" id="nextBtn">Next</button>
      </div>
    </div>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
  <script src="app.js"></script>
  <script src="quiz.js"></script>
</body>

</html>
